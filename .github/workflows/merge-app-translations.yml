name: Merge app translations into language-en.json

on:
  push:
    branches: [main]
    paths:
      - 'src/source/wallet-react.json'
      - 'src/source/wallet-react-native.json'

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync
        run: yarn sync

      - name: Commit and push language-en.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/language-en.json
          git diff --cached --quiet || git commit -m "chore: merge app translations into language-en.json" && git push
